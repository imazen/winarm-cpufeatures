name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Native ARM64 — the primary target. windows-11-arm is the headline
  # runner: this is where this crate has to actually deliver value.
  # ────────────────────────────────────────────────────────────────────────
  test-aarch64:
    name: Test aarch64 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-11-arm,    name: Windows ARM64 }
          - { os: ubuntu-24.04-arm,  name: Linux ARM64 }
          - { os: macos-14,          name: macOS 14 (M1) }
          - { os: macos-latest,      name: macOS latest (M1) }

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Tests
        run: cargo test

      # The Neoverse N2 assertion test is `#[ignore]` by default but the
      # GH `windows-11-arm` and `ubuntu-24.04-arm` runners both ARE Neoverse
      # N2 / Cobalt 100, so we run it explicitly here. Failure means our
      # detection regressed against the known hardware feature set. Needs
      # `--features registry` because several N2 features (sm4, paca, pacg,
      # dpb, dpb2, fhm, fcma, frintts) are Registry-classified — IPFP can't
      # see them.
      - name: Neoverse N2 hardware assertions
        if: matrix.os == 'windows-11-arm' || matrix.os == 'ubuntu-24.04-arm'
        run: cargo test --features registry --test hardware_assertions -- --ignored neoverse_n2 --nocapture

      - name: Dump features
        shell: bash
        run: cargo run --example dump_features 2>&1 | tee feature-dump.txt

      - name: Upload feature dump
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-dump-${{ matrix.os }}
          path: feature-dump.txt

  # ────────────────────────────────────────────────────────────────────────
  # Non-aarch64 targets — confirm the crate compiles and tests pass on
  # platforms where it's a no-op pass-through.
  # ────────────────────────────────────────────────────────────────────────
  test-other:
    name: Test other (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-26-intel]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - run: cargo test

  # ────────────────────────────────────────────────────────────────────────
  # Cross-compile sanity — confirm the crate builds for the targets archmage
  # cares about, even if we can't run on them here.
  # ────────────────────────────────────────────────────────────────────────
  cross-build:
    name: Cross-build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-pc-windows-msvc
          - aarch64-apple-darwin
          - wasm32-unknown-unknown
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target ${{ matrix.target }}

  # ────────────────────────────────────────────────────────────────────────
  # Cross-arch testing under QEMU. Real test execution on i686 + armv7
  # exercises the non-aarch64 stub (returns false for every name). The
  # aarch64-linux entry is redundant with native ubuntu-24.04-arm but
  # confirms cross-toolchain parity. Catches issues that `cargo build
  # --target` doesn't — e.g. cfg-gated test code that compiles but
  # mis-asserts at runtime.
  # ────────────────────────────────────────────────────────────────────────
  cross-test:
    name: Cross-test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
      - name: Test default features
        run: cross test --target ${{ matrix.target }}
      - name: Test --features registry
        run: cross test --features registry --target ${{ matrix.target }}

  # ────────────────────────────────────────────────────────────────────────
  # Feature-flag combinations. Catches dead-code / missing-cfg-gate bugs
  # that only surface when a specific feature subset is selected. One
  # Linux-x64 runner is enough; native ARM coverage stays in test-aarch64.
  # ────────────────────────────────────────────────────────────────────────
  feature-combos:
    name: Features (${{ matrix.combo.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo:
          - { name: "no-default", args: "--no-default-features" }
          - { name: "default",    args: "" }
          - { name: "registry",   args: "--features registry" }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build ${{ matrix.combo.args }}
      - run: cargo test ${{ matrix.combo.args }}
      - run: cargo clippy --all-targets ${{ matrix.combo.args }} -- -D warnings

  # ────────────────────────────────────────────────────────────────────────
  # Nightly-only feature combinations. Exercises the
  # `nightly-stdarch` paths that need rustc nightly to compile.
  # ────────────────────────────────────────────────────────────────────────
  feature-combos-nightly:
    name: Features nightly (${{ matrix.combo.name }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        combo:
          - { name: "nightly-stdarch",          args: "--features nightly-stdarch" }
          - { name: "registry+nightly-stdarch", args: "--features registry,nightly-stdarch" }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo build ${{ matrix.combo.args }}
      - run: cargo test ${{ matrix.combo.args }}

  # ────────────────────────────────────────────────────────────────────────
  # MSRV — every supported platform.
  # ────────────────────────────────────────────────────────────────────────
  msrv:
    name: MSRV 1.85 (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     name: Linux x64 }
          - { os: windows-latest,    name: Windows x64 }
          - { os: macos-26-intel,    name: macOS Intel }
          - { os: ubuntu-24.04-arm,  name: Linux ARM64 }
          - { os: macos-14,          name: macOS ARM64 }
          - { os: windows-11-arm,    name: Windows ARM64 }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  # ────────────────────────────────────────────────────────────────────────
  # SVE execution test on nightly. Compiles `tests/sve_execution.rs` with
  # `RUSTFLAGS=-C target-feature=+sve` and runs it on the Neoverse N2 Linux
  # runner — confirms that when our detection says `sve`, the SVE
  # instruction stream actually executes without faulting.
  # ────────────────────────────────────────────────────────────────────────
  nightly-sve:
    name: Nightly SVE execution
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build with SVE target feature
        env:
          RUSTFLAGS: "-C target-feature=+sve"
        run: cargo build --features nightly-sve --tests
      - name: Run SVE execution test
        env:
          RUSTFLAGS: "-C target-feature=+sve"
        run: cargo test --features nightly-sve --test sve_execution -- --nocapture

  # ────────────────────────────────────────────────────────────────────────
  # Lints
  # ────────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings
